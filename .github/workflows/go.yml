---
name: "lint"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Install libusb development packages
        run: |
          sudo apt-get update
          sudo apt-get install -y libusb-1.0-0-dev librtlsdr-dev

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9

