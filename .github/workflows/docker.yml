---
name: "build images"

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_run:
    workflows: ["auto tag"]
    types:
      - completed

permissions:
  contents: read
  packages: write

env:
  PLATFORMS: linux/arm64,linux/amd64,linux/arm/v7

jobs:
  docker:
    runs-on: ubuntu-latest
    # Only run if triggered by tag push, PR, or successful auto tag workflow
    if: >
      github.event_name == 'push' ||
      github.event_name == 'pull_request' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version tag
        id: get_tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            git fetch --tags
            VERSION=$(git describe --tags --abbrev=0)
          elif [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/}
          else
            VERSION=$(git describe --tags --always --dirty)
          fi
          echo "tag=${VERSION}" >> $GITHUB_OUTPUT
          echo "Version: ${VERSION}"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          flavor: |
            latest=auto
          tags: |
            # For workflow_run, use the latest git tag
            type=raw,value=${{ steps.get_tag.outputs.tag }},enable=${{ github.event_name == 'workflow_run' || github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'workflow_run' || github.event_name == 'push' }}
            # For direct tag pushes
            type=semver,pattern={{version}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.event_name == 'push' }}
            type=semver,pattern={{major}},enable=${{ github.event_name == 'push' }}
            type=raw,value=latest,enable=${{ github.event_name == 'push' }}
            # For PRs, use sha
            type=sha,enable=${{ github.event_name == 'pull_request' }}
          images: |
            ghcr.io/${{ github.repository }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: ${{ env.PLATFORMS }}
          file: Containerfile
          build-args: |
            VERSION=${{ steps.get_tag.outputs.tag }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
